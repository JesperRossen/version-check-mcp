version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: version-check-mcp
    main: ./cmd/version-check-mcp
    binary: version-check-mcp
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X github.com/JesperRossen/version-check-mcp/internal/version.Version={{.Version}}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

brews:
  - name: version-check-mcp
    repository:
      owner: JesperRossen
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/JesperRossen/version-check-mcp"
    description: "Lightweight MCP server giving AI coding agents a single source of truth for software package versions"
    license: "MIT"
    install: |
      bin.install "version-check-mcp"
    test: |
      assert_match version.to_s, shell_output("#{bin}/version-check-mcp --version")

release:
  github:
    owner: JesperRossen
    name: version-check-mcp
  prerelease: auto
  draft: false

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
