name: CI

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
          cache-dependency-path: go.sum

      - name: go vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./... -count=1 -race -timeout 5m

      - name: Integration tests (fixture-replay)
        run: go test -tags testfixtures ./test/integration/... -count=1 -timeout 5m

  release:
    name: GoReleaser + MCPB
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
          cache-dependency-path: go.sum

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v2
        with:
          distribution: goreleaser
          version: "v2.15.4"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Setup Node (for mcpb)
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build MCPB bundle
        env:
          GITHUB_TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Install the official MCPB CLI (CI-only, not a Go dep)
          npm install -g @anthropic-ai/mcpb

          # Create bundle staging directory and copy arch-specific binaries.
          # Uses GoReleaser's artifacts.json to locate exact paths (avoids
          # BSD vs GNU find glob differences with -path across separators).
          mkdir -p mcpb-staging/server
          python3 .github/release/copy-binaries.py

          # Copy static arch-selector wrapper scripts (sh; selects amd64 or arm64 at runtime).
          cp .github/release/server/version-check-mcp-darwin mcpb-staging/server/version-check-mcp-darwin
          cp .github/release/server/version-check-mcp-linux  mcpb-staging/server/version-check-mcp-linux

          chmod +x \
            mcpb-staging/server/version-check-mcp-darwin \
            mcpb-staging/server/version-check-mcp-linux \
            mcpb-staging/server/version-check-mcp-darwin-amd64 \
            mcpb-staging/server/version-check-mcp-darwin-arm64 \
            mcpb-staging/server/version-check-mcp-linux-amd64 \
            mcpb-staging/server/version-check-mcp-linux-arm64

          # Generate manifest.json from template (substitute __VERSION__ placeholder).
          # ${__dirname} in the template stays literal - it is substituted at runtime
          # by the MCPB host with the extension install directory.
          VERSION="${GITHUB_TAG#v}"
          sed "s/__VERSION__/${VERSION}/" .github/release/manifest.json.tmpl > mcpb-staging/manifest.json

          # Pack and attach to the GitHub Release created by GoReleaser.
          mcpb pack mcpb-staging version-check-mcp.mcpb
          gh release upload "${GITHUB_TAG}" version-check-mcp.mcpb --clobber
