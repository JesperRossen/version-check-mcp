name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: GoReleaser + MCPB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v2
        with:
          distribution: goreleaser
          version: "v2.15.4"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Setup Node (for mcpb)
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build MCPB bundle
        env:
          GITHUB_TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Install the official MCPB CLI (CI-only, not a Go dep)
          npm install -g @anthropic-ai/mcpb

          # Create the bundle staging directory
          mkdir -p mcpb-staging/server

          # Copy platform-specific binaries with distinct names so they don't overwrite
          # each other. darwin: arm64 (Apple Silicon, most Claude Desktop users).
          # linux: amd64 (most common server/CI arch). win32: amd64.
          DARWIN_BIN=$(find dist -name "version-check-mcp" -path "*/darwin_arm64*" | head -1)
          LINUX_BIN=$(find dist -name "version-check-mcp" -path "*/linux_amd64*" | head -1)
          WINDOWS_BIN=$(find dist -name "version-check-mcp.exe" -path "*/windows_amd64*" | head -1)
          cp "$DARWIN_BIN"  mcpb-staging/server/version-check-mcp-darwin
          cp "$LINUX_BIN"   mcpb-staging/server/version-check-mcp-linux
          cp "$WINDOWS_BIN" mcpb-staging/server/version-check-mcp-windows.exe

          # Extract version (strip "v" prefix) before the heredoc.
          # \${__dirname} stays literal in the JSON: it is a runtime substitution variable
          # that the MCPB host application replaces with the extension install directory.
          VERSION="${GITHUB_TAG#v}"

          # Write manifest.json per the MCPB 0.3 spec (anthropics/mcpb MANIFEST.md).
          cat > mcpb-staging/manifest.json <<EOF
          {
            "manifest_version": "0.3",
            "name": "version-check-mcp",
            "display_name": "Version Check MCP",
            "version": "${VERSION}",
            "description": "Resolves exact package versions from NPM, PyPI, Go Modules, GitHub Actions, and Maven. Stops AI agents from hallucinating version strings.",
            "author": {
              "name": "Jesper Rossen"
            },
            "repository": {
              "type": "git",
              "url": "https://github.com/JesperRossen/version-check-mcp.git"
            },
            "server": {
              "type": "binary",
              "entry_point": "server/version-check-mcp-linux",
              "mcp_config": {
                "command": "\${__dirname}/server/version-check-mcp-linux",
                "args": [],
                "env": {},
                "platform_overrides": {
                  "darwin": {
                    "command": "\${__dirname}/server/version-check-mcp-darwin"
                  },
                  "win32": {
                    "command": "\${__dirname}/server/version-check-mcp-windows.exe"
                  }
                }
              }
            },
            "tools_generated": true,
            "license": "MIT",
            "compatibility": {
              "platforms": ["darwin", "win32", "linux"]
            }
          }
          EOF

          # Pack the bundle
          cd mcpb-staging
          mcpb pack . ../version-check-mcp.mcpb
          cd ..

          # Attach to the existing GitHub Release (created by GoReleaser)
          gh release upload "${GITHUB_TAG}" version-check-mcp.mcpb --clobber
